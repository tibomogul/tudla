# Development uses solid_cable (not async) because Pulse notifications are
# broadcast from the Solid Queue worker process (bin/jobs) — the async adapter
# is in-process only and those broadcasts would never reach the browser.
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
